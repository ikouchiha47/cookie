<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Cookie Character Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px 20px; }
    h1 { color: #fff; text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { color: #444; text-align: center; font-size: 12px; margin-bottom: 36px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; max-width: 860px; margin: 0 auto; }
    .card { background: #14161f; border: 1px solid #22253a; border-radius: 14px; padding: 18px 12px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: border-color .2s, transform .15s; }
    .card:hover { border-color: #3a3d55; transform: translateY(-2px); }
    .card.active { border-color: #5BC8E8; background: #161922; }
    .card svg { width: 120px; height: auto; overflow: visible; }
    .label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: .6px; font-weight: 500; }
    .card.active .label { color: #5BC8E8; }
    @media (max-width: 680px) { .grid { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>

<script>
// ─── Schema ───────────────────────────────────────────────────────────────────
// Face rig values (geometry extracted from character_v1.json)
const SCHEMA = {

// ─── Expressions (from robot/expressions.ts) ─────────────────────────────────
const DEFAULT = {
  eyeOpenness: 0.85, eyeRightOpenness: 0.85,

const EXPRESSIONS = {
  idle:        { label: "Unimpressed",  eyeOpenness: 0.28, eyeRightOpenness: 0.28, mouthCurve: 0 },
  happy:       { label: "Delighted",    eyeOpenness: 1, eyeRightOpenness: 1, mouthCurve: 1, mouthOpen: 0.15 },
  thinking:    { label: "Wondering",    eyeLookY: -0.5, mouthCurve: 0.2, antennaLight: "thinking" },
  confused:    { label: "Confused",     eyeOpenness: 1, eyeRightOpenness: 0.3, mouthCurve: -0.25, antennaLight: "thinking" },
  sad:         { label: "Sad",          eyeOpenness: 0.55, eyeRightOpenness: 0.55, eyeLookY: 0.4, mouthCurve: -0.85, tearDrop: true },
  angry:       { label: "Furious",      eyeOpenness: 0.45, eyeRightOpenness: 0.45, mouthCurve: -0.9, screenTint: "#2a0a0a", antennaLight: "alert", pulseSpeed: 1.5 },
  embarrassed: { label: "Blushing",     eyeOpenness: 0.75, eyeRightOpenness: 0.75, mouthCurve: 0.7, blush: true },
  wink:        { label: "Cool Wink",    eyeOpenness: 1, eyeRightOpenness: 0.04, mouthCurve: 0.55 },

  excited:     { label: "Excited",      eyeOpenness: 1, eyeRightOpenness: 1, mouthCurve: 1, mouthOpen: 0.35, heartFloat: true, antennaLight: "thinking", pulseSpeed: 0.8 },
};

// ─── Param helpers ────────────────────────────────────────────────────────────
function mergeParams(expr) {
  return { ...DEFAULT, ...expr };
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// mouthCurve -1→1 maps to controlY_min→controlY_max
function mouthControlY(curve) {
  const t = (clamp(curve, -1, 1) + 1) / 2;
  return lerp(SCHEMA.mouth.controlY_min, SCHEMA.mouth.controlY_max, t);
}

// browAngle from eyeOpenness + mouthCurve
// negative mouthCurve (sad) → worried brows (/ \)
// positive mouthCurve (happy) → neutral/raised brows
function browAngles(p) {
  const sadness = clamp(-p.mouthCurve, 0, 1);        // 0→1 as mouth frowns
  const anger = p.eyeOpenness < 0.5 && p.mouthCurve < 0 ? 0.8 : 0;
  if (anger > 0) {
    // angry: \ / (positive left, negative right)
    return { left: 28 * anger, right: -28 * anger };
  }
  if (sadness > 0.3) {
    // sad/concerned: / \ (negative left, positive right)
    return { left: -22 * sadness, right: 22 * sadness };
  }
  // happy/neutral: slight negative (slightly raised inner)
  const happiness = clamp(p.mouthCurve, 0, 1);
  return { left: -8 * happiness, right: 8 * happiness };
}

// eye fill color based on antenna/screen state
function eyeColor(p) {
  if (p.antennaLight === "alert" || p.screenTint) return "#E05040";
  return "#5BC8E8";
}

function signalColor(p) {
  return SCHEMA.signal.colors[p.antennaLight] ?? SCHEMA.signal.colors.idle;
}

  const orbEl = `<g transform="${T}">
    ${glowR > 0 ? `<ellipse cx="${INK.orbCx}" cy="${INK.orbCy}" rx="${glowR}" ry="${glowR}" fill="${sigColor}" opacity="0.35" filter="url(#antGlow)"/>` : ""}
    <ellipse cx="${INK.orbCx}" cy="${INK.orbCy}" rx="5.07" ry="4.93" fill="${sigColor}"/>
    <ellipse cx="${INK.orbCx-1.5}" cy="${INK.orbCy-1.8}" rx="1.5" ry="1.2" fill="rgba(255,255,255,0.4)"/>
  </g>`;

  // Screen tint overlay
  const screenTintEl = p.screenTint
    ? `<path transform="${T}" fill="${p.screenTint}" fill-opacity="0.55" stroke="none" fill-rule="evenodd"
        d="m -264.73246,134.23218 c 0,7.00329 1.48026,18.99095 -5.43553,24.94358
           -8.73672,7.51997 -26.24471,8.70466 -40.58338,8.70466
           -14.80983,0 -28.58662,-1.87515 -36.53122,-9.39639
           -5.47512,-5.18335 -4.78684,-17.04444 -4.78684,-23.75702
           0,-15.85056 18.59819,-21.52499 44.28702,-21.52499
           25.68883,0 43.04995,5.1796 43.04995,21.03016 z"/>`
    : "";

  // Brows — rotate around inner endpoint using Inkscape coords
  const browColor = p.antennaLight === "alert" ? "#E05040" : "#00ffff";
  const browW = p.mouthCurve < -0.5 ? 2.0 : 1.5;
  const lBrowEl = `<g transform="${T}">
    <line x1="${INK.lBrow.x1}" y1="${INK.lBrow.y}" x2="${INK.lBrow.x2}" y2="${INK.lBrow.y}"
      stroke="${browColor}" stroke-width="${browW}" stroke-linecap="round"
      transform="rotate(${ba.left}, ${INK.lBrow.x2}, ${INK.lBrow.y})"/>
  </g>`;
  const rBrowEl = `<g transform="${T}">
    <line x1="${INK.rBrow.x1}" y1="${INK.rBrow.y}" x2="${INK.rBrow.x2}" y2="${INK.rBrow.y}"
      stroke="${browColor}" stroke-width="${browW}" stroke-linecap="round"
      transform="rotate(${ba.right}, ${INK.rBrow.x1}, ${INK.rBrow.y})"/>
  </g>`;

  // Eyes — Y-scale around eye center, translate for look direction
  const lOpen  = clamp(p.eyeOpenness,      0.05, 1.3);
  const rOpen  = clamp(p.eyeRightOpenness, 0.05, 1.3);
  const lookDx = p.eyeLookX * INK.eyeRx * 0.5;
  const lookDy = p.eyeLookY * INK.eyeRy * 0.45;

  function eyeEl(cx, cy, openness) {
    if (openness <= 0.08) {
      return `<path d="M ${cx-INK.eyeRx},${cy} Q ${cx},${cy-5} ${cx+INK.eyeRx},${cy}"
        fill="none" stroke="${ec}" stroke-width="2" stroke-linecap="round"/>`;
    }
    return `<g transform="translate(0,${cy}) scale(1,${openness}) translate(0,${-cy})">
      <ellipse cx="${cx}" cy="${cy}" rx="${INK.eyeRx}" ry="${INK.eyeRy}" fill="${ec}" filter="url(#eyeGlow)"/>
      <ellipse cx="${cx-INK.eyeRx*0.28}" cy="${cy-INK.eyeRy*0.35}" rx="${INK.eyeRx*0.3}" ry="${INK.eyeRy*0.32}" fill="rgba(255,255,255,0.72)"/>
    </g>`;
  }
  const lEyeEl = `<g transform="${T} translate(${lookDx},${lookDy})">${eyeEl(INK.lEye.cx, INK.lEye.cy, lOpen)}</g>`;
  const rEyeEl = `<g transform="${T} translate(${-lookDx},${lookDy})">${eyeEl(INK.rEye.cx, INK.rEye.cy, rOpen)}</g>`;

  // Mouth — proper flip for frown, scale for smile
  // mouthCenterY = top + half the path height (8.07px)
  const mouthCenterY = INK.mouthTopY + 4.036;
  let mouthEl;
  if (p.mouthShape === "open") {
    const mry = Math.max(2, 8 * p.mouthOpen);
    mouthEl = `<g transform="${T}">
      <ellipse cx="${INK.mouthCx}" cy="${INK.mouthTopY + mry*0.5}" rx="8.2" ry="${mry}"
        fill="#1a1c22" stroke="${ec}" stroke-width="1.2"/>
    </g>`;
  } else if (p.mouthCurve === 0 && p.mouthOpen === 0) {
    // Flat mouth — horizontal line
    mouthEl = `<g transform="${T}">
      <line x1="${INK.mouthCx - 8.2}" y1="${INK.mouthTopY}" x2="${INK.mouthCx + 8.2}" y2="${INK.mouthTopY}"
        stroke="${ec}" stroke-width="1.4" stroke-linecap="round"/>
    </g>`;
  } else if (p.mouthCurve < 0) {
    // Frown: flip vertically around the mouth's center, then scale intensity
    const intensity = lerp(0.5, 1.15, clamp(-p.mouthCurve, 0, 1));
    mouthEl = `<g transform="${T}">
      <g transform="translate(0,${mouthCenterY}) scale(1,${-intensity}) translate(0,${-mouthCenterY})">
        <path d="${INK.mouthPath}" fill="#F5F0E8"
          stroke="${ec}" stroke-width="1.4" stroke-linecap="round"/>
      </g>
    </g>`;
  } else {
    // Smile: scale upward from top edge
    const mScale = lerp(0.55, 1.2, clamp(p.mouthCurve, 0, 1));
    mouthEl = `<g transform="${T}">
      <g transform="translate(0,${INK.mouthTopY}) scale(1,${mScale}) translate(0,${-INK.mouthTopY})">
        <path d="${INK.mouthPath}" fill="#F5F0E8"
          stroke="${ec}" stroke-width="1.4" stroke-linecap="round"/>
      </g>
    </g>`;
  }

  // Overlays — rendered from schema emotion layers (colors come from SVG directly)
  const activeEmotions = new Set();
  if (p.blush)      activeEmotions.add("blush");
  if (p.tearDrop)   activeEmotions.add("tears");
  if (p.sweatDrop)  activeEmotions.add("concerned");
  if (p.heartFloat) activeEmotions.add("excited");
  if (name === "confused") activeEmotions.add("confused");

  let overlayEls = "";
  if (window.EMOTION_LAYERS) {
    for (const label of activeEmotions) {
      const layer = window.EMOTION_LAYERS[label];
      if (!layer) continue;
      const paths = layer.elements.map(el => {
        const fill = el.fill ?? "none";
        const fillOpacity = el.fillOpacity ?? 1;
        const t = el.transform ? ` transform="${el.transform}"` : "";
        if (el.type === "path") {
          return `<path d="${el.d}" fill="${fill}" fill-opacity="${fillOpacity}"` +
            (el.fillRule ? ` fill-rule="${el.fillRule}"` : "") +
            (el.stroke ? ` stroke="${el.stroke}"` : "") +
            (el.strokeWidth ? ` stroke-width="${el.strokeWidth}"` : "") +
            `${t}/>`;
        }
        if (el.type === "ellipse") {
          return `<ellipse cx="${el.cx}" cy="${el.cy}" rx="${el.rx}" ry="${el.ry}"` +
            ` fill="${fill}" fill-opacity="${fillOpacity}"${t}/>`;
        }
        return "";
      }).join("\n");
      overlayEls += `<g transform="${T}">${paths}</g>`;
    }
  } else {
    // Fallback until schema loads
    if (p.sweatDrop)  overlayEls += `<use href="#sweat-drop"/>`;
    if (p.heartFloat) overlayEls += `<use href="#excited-sparks"/>`;
    if (name === "confused") overlayEls += `<use href="#confused-mark"/>`;
  }

  return `<div class="card" onclick="this.classList.toggle('active')">
  <svg viewBox="0 0 132.60208 167.63483" xmlns="http://www.w3.org/2000/svg" overflow="visible" style="overflow:visible">
    <use href="#rb"/>
    ${screenTintEl}
    ${orbEl}
    ${lBrowEl}
    ${rBrowEl}
    ${lEyeEl}
    ${rEyeEl}
    ${mouthEl}
    ${overlayEls}
  </svg>
  <span class="label">${expr.label}</span>
</div>`;
}

// ─── Build board ─────────────────────────────────────────────────────────────
function buildBoard() {
  const board = document.getElementById("board");
  board.innerHTML = Object.entries(EXPRESSIONS)
    .map(([name, expr]) => renderCard(name, expr))
    .join("\n");
}

// Load schema then render (emotion layers drive overlay rendering)
fetch("src/characters/robot/character_v1.json")
  .then(r => r.json())
  .then(schema => {
    window.EMOTION_LAYERS = schema.controls.emotions;
    buildBoard();
  })
  .catch(() => {
    // Fallback: render with symbol-based overlays
    buildBoard();
  });

document.addEventListener("click", e => {
  if (!e.target.closest(".card"))
    document.querySelectorAll(".card.active").forEach(c => c.classList.remove("active"));
});
</script>
</body>
</html>
